<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tasks" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Task Manager</h1>
    <button id="add-task-btn" class="btn btn-primary">+ Add Task</button>
  </header>

  <main>
    <div id="empty-state" class="empty-state hidden">
      <p>No tasks yet. Click <strong>+ Add Task</strong> to get started.</p>
    </div>
    <div id="task-list"></div>
  </main>

  <!-- FAB (mobile add button) -->
  <button id="fab-btn" class="fab" aria-label="Add Task">+</button>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h2 id="modal-title">Add Task</h2>
      <form id="task-form" novalidate>
        <input type="hidden" id="task-id" />

        <div class="form-group">
          <label for="task-title">Title <span class="required">*</span></label>
          <input type="text" id="task-title" placeholder="Task title" required />
          <span class="field-error hidden" id="title-error">Title is required.</span>
        </div>

        <div class="form-group">
          <label for="task-description">Description</label>
          <textarea id="task-description" rows="3" placeholder="Optional description"></textarea>
        </div>

        <div class="form-group">
          <label for="task-due-date">Due Date</label>
          <input type="date" id="task-due-date" />
        </div>

        <div class="modal-actions">
          <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
