<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tasks" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Auth bar -->
  <div id="auth-bar">
    <button id="sign-in-btn" class="btn btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.705 17.64 9.2z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
    <div id="user-info" class="hidden">
      <img id="user-photo" src="" alt="" class="user-avatar" />
      <span id="user-name"></span>
      <button id="sign-out-btn" class="btn btn-secondary btn-sm">Sign out</button>
    </div>
  </div>

  <header>
    <h1>Task Manager</h1>
    <button id="add-task-btn" class="btn btn-primary hidden">+ Add Task</button>
  </header>

  <!-- Tabs -->
  <nav class="tabs" role="tablist">
    <button class="tab active" data-tab="my-tasks" role="tab" aria-selected="true">My Tasks</button>
    <button class="tab" data-tab="public-feed" role="tab" aria-selected="false">Public Feed</button>
  </nav>

  <main>
    <!-- My Tasks Panel -->
    <div id="my-tasks-panel" role="tabpanel">
      <div id="auth-prompt" class="empty-state hidden">
        <p>Sign in with Google to view and manage your tasks.</p>
      </div>
      <div id="empty-state" class="empty-state hidden">
        <p>No tasks yet. Click <strong>+ Add Task</strong> to get started.</p>
      </div>
      <div id="task-list"></div>
    </div>

    <!-- Public Feed Panel -->
    <div id="public-feed-panel" class="hidden" role="tabpanel">
      <div id="feed-empty" class="empty-state hidden">
        <p>No public tasks yet. Be the first to share one!</p>
      </div>
      <div id="feed-list"></div>
    </div>
  </main>

  <!-- FAB (mobile add button) -->
  <button id="fab-btn" class="fab hidden" aria-label="Add Task">+</button>

  <!-- Toast -->
  <div id="toast" class="toast hidden" aria-live="polite"></div>

  <!-- Task Modal (add / edit) -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h2 id="modal-title">Add Task</h2>
      <form id="task-form" novalidate>
        <input type="hidden" id="task-id" />

        <div class="form-group">
          <label for="task-title">Title <span class="required">*</span></label>
          <input type="text" id="task-title" placeholder="Task title" required />
          <span class="field-error hidden" id="title-error">Title is required.</span>
        </div>

        <div class="form-group">
          <label for="task-description">Description</label>
          <textarea id="task-description" rows="3" placeholder="Optional description"></textarea>
        </div>

        <div class="form-group">
          <label for="task-due-date">Due Date</label>
          <input type="date" id="task-due-date" />
        </div>

        <div class="form-group">
          <label>Visibility</label>
          <div class="visibility-toggle">
            <label class="vis-option">
              <input type="radio" name="visibility" value="private" checked />
              <span>&#128274; Private</span>
            </label>
            <label class="vis-option">
              <input type="radio" name="visibility" value="public" />
              <span>&#127760; Public</span>
            </label>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Task Detail Modal (share links) -->
  <div id="detail-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <div id="detail-content"></div>
      <div class="modal-actions" style="margin-top:1.2rem">
        <button id="detail-close" class="btn btn-secondary">Close</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
